<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galeria de Artes Digitais e NFTs - Jackson Tavares Veiga.">
    <title>Galeria de Arte Digital - Jackson Tavares Veiga</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf8f5;
            --text-color: #1a1a1a;
            --accent-color: #8B6F47;
            --card-bg: #ffffff;
            --border-color: #e8e4dc;
            --header-bg: rgba(250, 248, 245, 0.95);
            --opensea-color: #2081E2;
            --sarafu-color: #4CAF50;
            --academic-color: #673AB7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        /* Hero Section */
        .hero {
            padding: 8rem 0 4rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Gallery Grid */
        .gallery-section {
            padding: 4rem 0;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .nft-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobile: 1 column */
            gap: 2.5rem;
        }

        @media (min-width: 1024px) {
            .nft-grid {
                grid-template-columns: repeat(3, 1fr); /* Desktop: 3 columns */
            }
        }

        /* NFT Card */
        .nft-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .nft-card:hover {
            transform: translateY(-5px);
        }

        .nft-image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #eee;
            position: relative;
            overflow: hidden;
        }

        .nft-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #e8e4dc, #f5f2ed);
            color: var(--accent-color);
            font-size: 3rem;
        }

        .nft-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .nft-caption {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .expand-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            align-self: flex-start;
        }

        .expand-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .nft-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s;
            font-size: 0.9rem;
            color: #555;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .nft-details.active {
            max-height: 800px; /* Increased to fit new buttons */
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid #eee;
        }

        .detail-item {
            margin-bottom: 0.5rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--accent-color);
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Action Buttons in Details */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            transition: opacity 0.3s;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .btn-opensea { background-color: var(--opensea-color); }
        .btn-sarafu { background-color: var(--sarafu-color); }
        .btn-academic { background-color: var(--academic-color); }

        /* Footer */
        footer {
            padding: 4rem 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">🎨 Jackson T. Veiga</a>
                <nav id="main-nav">
                    <!-- Nav items will be injected here -->
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Galeria de Arte Digital</h1>
            <p>Uma coleção curada de certificados blockchain, pesquisas e expressões artísticas registradas em IPFS e Polygon.</p>
        </div>
    </section>

    <main class="container" id="gallery-container">
        <!-- Sections and NFTs will be injected here -->
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Jackson Tavares Veiga • Rede de Conhecimento Coletivo 2DM</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem;">Registrado em IPFS | Blockchain Polygon | Sarafu Network</p>
        </div>
    </footer>

    <script>
        // Dados das NFTs com os novos campos solicitados
        const nftData = {
            "name": "Rede de Conhecimento Coletivo 2DM",
            "children": [
                {
                    "name": "Engenharia & MRCF",
                    "children": [
                        {
                            "name": "Minicurso Framework MRCF",
                            "type": "NFT",
                            "metadata": {
                                "autor": "Jackson Tavares Veiga",
                                "blockchain": "Polygon",
                                "titulo": "Minicurso Framework MRCF",
                                "ipfs_cid": "4e4189150209cb19cd1cd87b2b25257327c7cfb7aceeb631ca68889dbce80fd2",
                                "data": "04/10/2025",
                                "descricao": "Framework para replanejamento de missões e controle de sistemas complexos.",
                                "opensea": "https://opensea.io/collection/2dm",
                                "sarafu": "https://sarafu.network/vouchers/0x5edA8e2EAEaF93a1b4d6dD20005FfC15091cA583",
                                "academic": "https://scholar.google.com/"
                            }
                        },
                        {
                            "name": "Controle de Manufatura",
                            "type": "NFT",
                            "metadata": {
                                "autor": "Jackson Tavares Veiga",
                                "blockchain": "Polygon",
                                "titulo": "Controle de Manufatura com Sistemas Distribuídos",
                                "ipfs_cid": "55a03f27f4bb1b6e297a90b32e267f95932607a1e8849697efc01628ec2e19d7",
                                "data": "Novembro / 2020",
                                "descricao": "Trabalho técnico sobre controle distribuído aplicado à manufatura inteligente.",
                                "opensea": "https://opensea.io/collection/2dm",
                                "sarafu": "https://sarafu.network/vouchers/0x5edA8e2EAEaF93a1b4d6dD20005FfC15091cA583"
                            }
                        }
                    ]
                },
                {
                    "name": "Arte & Digital",
                    "children": [
                        {
                            "name": "Portfólio Humanizado",
                            "type": "NFT",
                            "metadata": {
                                "autor": "Arã Yabytã (Akan)",
                                "blockchain": "IPFS",
                                "titulo": "Relatório de Experiência — Portfólio Digital Humanizado",
                                "ipfs_cid": "bafybeidvacdxnpogpu5stjrxq4i6zg3mffzcpowdcikx5ffisvman6rvfa",
                                "data": "2024",
                                "descricao": "Exploração de interfaces digitais com foco na experiência humana e coletiva.",
                                "opensea": "https://opensea.io/collection/2dm",
                                "sarafu": "https://sarafu.network/vouchers/0x5edA8e2EAEaF93a1b4d6dD20005FfC15091cA583",
                                "site": "https://silviagilwanova.netlify.app/"
                            }
                        }
                    ]
                }
            ]
        };

        function initGallery() {
            const container = document.getElementById('gallery-container');
            const nav = document.getElementById('main-nav');

            nftData.children.forEach((section, index) => {
                const sectionId = `section-${index}`;
                
                const navLink = document.createElement('a');
                navLink.href = `#${sectionId}`;
                navLink.textContent = section.name;
                nav.appendChild(navLink);

                const sectionEl = document.createElement('section');
                sectionEl.id = sectionId;
                sectionEl.className = 'gallery-section';
                
                const title = document.createElement('h2');
                title.className = 'section-title';
                title.textContent = section.name;
                sectionEl.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'nft-grid';

                renderNFTs(section.children, grid);

                sectionEl.appendChild(grid);
                container.appendChild(sectionEl);
            });
        }

        function renderNFTs(items, gridElement) {
            items.forEach(item => {
                if (item.type === 'NFT') {
                    const card = createNFTCard(item);
                    gridElement.appendChild(card);
                } else if (item.children) {
                    renderNFTs(item.children, gridElement);
                }
            });
        }

        function createNFTCard(nft) {
            const meta = nft.metadata;
            const card = document.createElement('div');
            card.className = 'nft-card';

            const placeholderIcon = meta.titulo.toLowerCase().includes('relatório') ? '📄' : '🖼️';

            card.innerHTML = `
                <div class="nft-image-container">
                    <div class="nft-placeholder">${placeholderIcon}</div>
                </div>
                <div class="nft-info">
                    <div class="nft-caption">${meta.titulo}</div>
                    <button class="expand-btn">Expandir Detalhes</button>
                    <div class="nft-details">
                        <div class="detail-item">
                            <span class="detail-label">Autor</span>
                            ${meta.autor}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Data</span>
                            ${meta.data}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Blockchain</span>
                            ${meta.blockchain}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">IPFS CID</span>
                            <code style="word-break: break-all; font-size: 0.7rem;">${meta.ipfs_cid}</code>
                        </div>
                        ${meta.descricao ? `
                        <div class="detail-item">
                            <span class="detail-label">Descrição</span>
                            ${meta.descricao}
                        </div>` : ''}
                        
                        <div class="action-buttons">
                            ${meta.opensea ? `<a href="${meta.opensea}" target="_blank" class="action-btn btn-opensea">🌊 OpenSea 2dM</a>` : ''}
                            ${meta.sarafu ? `<a href="${meta.sarafu}" target="_blank" class="action-btn btn-sarafu">🌱 Sarafu Network</a>` : ''}
                            ${meta.academic ? `<a href="${meta.academic}" target="_blank" class="action-btn btn-academic">🎓 Link Acadêmico</a>` : ''}
                            ${meta.site ? `<a href="${meta.site}" target="_blank" style="color: var(--accent-color); font-size: 0.8rem; text-align: center; margin-top: 5px;">Acessar Site Externo</a>` : ''}
                        </div>
                    </div>
                </div>
            `;

            const btn = card.querySelector('.expand-btn');
            const details = card.querySelector('.nft-details');

            btn.addEventListener('click', () => {
                const isActive = details.classList.toggle('active');
                btn.textContent = isActive ? 'Recolher' : 'Expandir Detalhes';
            });

            return card;
        }

        document.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
